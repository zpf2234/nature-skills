name: Validate README mirror consistency

on:
  pull_request:
    paths:
      - 'skills/**/README.md'
      - 'skills/**/README_EN.md'
      - 'scripts/validate-readme-mirror.py'
  push:
    paths:
      - 'skills/**/README.md'
      - 'skills/**/README_EN.md'
      - 'scripts/validate-readme-mirror.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-readme-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run README mirror validator
        run: python scripts/validate-readme-mirror.py
